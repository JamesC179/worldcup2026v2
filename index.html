<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC 2026">
<meta name="theme-color" content="#1a1a2e">
<title>World Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--card:#1e2040;--border:#2a2d50;
  --accent:#e94560;--gold:#f5a623;--text:#f0f0f0;--muted:#8888aa;
  --green:#2ecc71;--blue:#3498db;--red:#e74c3c;--purple:#9b59b6;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
body{display:flex;flex-direction:column;overflow:hidden}

.header{background:var(--surface);padding:12px 16px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.header-top h1{font-size:17px;font-weight:700;letter-spacing:.3px}
.trophy{font-size:22px;line-height:1}
.subtitle{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}

.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 10px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:color .2s,border-color .2s;letter-spacing:.3px;user-select:none}
.tab.active{color:var(--accent);border-color:var(--accent)}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}

.group-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.gpill{padding:5px 11px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none}
.gpill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.match-meta{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;gap:8px;align-items:center}
.match-meta .grp-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-meta .round-badge{background:var(--purple);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-meta .ko-badge{background:var(--gold);color:#1a1a2e;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-meta .kickoff{margin-left:auto;font-weight:700;color:var(--gold);font-size:12px}
.date-header{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px;margin:14px 2px 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.date-header:first-of-type{margin-top:0}
.tz-note{text-align:center;font-size:11px;color:var(--muted);font-style:italic;margin:16px 0 8px}

/* Predictor */
.predictor-banner{background:linear-gradient(135deg,#241b3a,#1a1a2e);border:1px solid var(--purple);border-radius:14px;padding:14px;margin-bottom:14px}
.pb-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px}
.pb-stats{display:flex;gap:8px}
.pb-stat{flex:1;text-align:center;background:rgba(155,89,182,.12);border-radius:10px;padding:8px 4px}
.pb-num{display:block;font-size:20px;font-weight:800;color:var(--purple)}
.pb-stat:first-child .pb-num{color:var(--gold)}
.pb-lbl{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.pb-note{font-size:10px;color:var(--muted);text-align:center;margin-top:9px;font-style:italic}
.pred-row{display:flex;align-items:center;gap:7px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.pred-label{font-size:11px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pred-input{width:34px;height:30px;background:#0f0f1a;border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield;transition:border-color .2s}
.pred-input:focus{border-color:var(--purple)}
.pred-input.pred-filled{border-color:var(--purple);color:var(--purple)}
.pred-input::-webkit-inner-spin-button,.pred-input::-webkit-outer-spin-button{-webkit-appearance:none}
.pred-dash{color:var(--muted);font-size:12px}
.pred-badge{margin-left:auto;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.pred-3{background:rgba(46,204,113,.18);color:var(--green)}
.pred-1{background:rgba(52,152,219,.18);color:var(--blue)}
.pred-0{background:rgba(231,76,60,.15);color:var(--red)}
.match-row{display:grid;grid-template-columns:1fr auto auto auto 1fr;gap:6px;align-items:center}
.team-name{font-size:13px;font-weight:600}
.team-name.home{text-align:right}
.team-name.away{text-align:left}
.team-name.tbd{color:var(--muted);font-style:italic}
.score-input{width:44px;height:40px;background:#0f0f1a;border:2px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield;transition:border-color .2s}
.score-input:focus{border-color:var(--accent)}
.score-input.filled{border-color:var(--gold);color:var(--gold)}
.score-input:disabled{opacity:.3;cursor:not-allowed}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none}
.vs{font-size:11px;color:var(--muted);font-weight:500;padding:0 2px}
.match-result{font-size:11px;margin-top:5px;text-align:center}
.result-hw{color:var(--green)}
.result-draw{color:var(--blue)}
.result-aw{color:var(--gold)}

/* Penalties row */
.pens-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:11px;color:var(--muted)}
.pens-row span{font-weight:600}
.pen-input{width:36px;height:28px;background:#0f0f1a;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield}
.pen-input::-webkit-inner-spin-button,.pen-input::-webkit-outer-spin-button{-webkit-appearance:none}
.pen-input.filled{border-color:var(--purple);color:var(--purple)}

/* ET label */
.et-label{text-align:center;font-size:10px;color:var(--purple);margin-top:4px;font-weight:600}

.group-section{margin-bottom:18px}
.group-title{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--accent);padding:8px 12px;background:var(--card);border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;display:flex;align-items:center;gap:8px}
.group-title span{color:var(--muted);font-size:11px;font-weight:400;margin-left:auto}
.standings-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:0 0 8px 8px;overflow:hidden}
.standings-table th{font-size:10px;font-weight:600;color:var(--muted);padding:6px 4px;text-align:center;background:#16182e;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.standings-table th.team-col{text-align:left;padding-left:10px}
.standings-table td{font-size:12px;padding:8px 4px;text-align:center;border-bottom:1px solid #1a1c36}
.standings-table td.team-col{text-align:left;padding-left:10px;font-weight:600;font-size:13px}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr.qualify td{background:#1a2a1a}
.standings-table tr.playoff td{background:#1a1a2a}
.standings-table tr.qualify td.pos{color:var(--green);font-weight:700}
.standings-table tr.playoff td.pos{color:var(--blue);font-weight:700}
.pos{color:var(--muted);font-size:11px;font-weight:700;width:20px}
.pts{font-weight:700;color:var(--gold)}
.gd-pos{color:var(--green)}
.gd-neg{color:var(--red)}

/* Bracket */
.bracket-section{margin-bottom:20px}
.bracket-title{font-size:12px;font-weight:700;letter-spacing:.8px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;padding:6px 10px;background:var(--card);border-radius:6px;border-left:3px solid var(--gold)}
.bracket-match{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:8px}
.bm-label{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bm-row{display:grid;grid-template-columns:1fr auto auto auto 1fr;gap:6px;align-items:center}
.bm-team{font-size:13px;font-weight:600}
.bm-team.right{text-align:right}
.bm-team.tbd{color:var(--muted);font-style:italic;font-size:11px}
.bm-score{width:36px;height:34px;background:#0f0f1a;border:2px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield;transition:border-color .2s}
.bm-score:focus{border-color:var(--accent)}
.bm-score.filled{border-color:var(--gold);color:var(--gold)}
.bm-score:disabled{opacity:.25;cursor:not-allowed}
.bm-score::-webkit-inner-spin-button,.bm-score::-webkit-outer-spin-button{-webkit-appearance:none}
.bm-vs{font-size:10px;color:var(--muted)}
.winner-tag{font-size:10px;color:var(--green);margin-top:4px;text-align:center;font-weight:600}
.tbd-notice{text-align:center;font-size:12px;color:var(--muted);padding:20px;font-style:italic}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#222;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="trophy">🏆</span>
    <h1>World Cup 2026</h1>
    <span class="subtitle" id="progress-text">0 / 72 played</span>
  </div>

<div class="main" id="main-content"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const RAW = {"groups":{"A":{"teams":["Mexico","South Africa","South Korea","Czech Republic"],"matches":[{"id":"A0","home":"Mexico","away":"South Africa","date":"Jun 11","time":"20:00","sk":6112000},{"id":"A1","home":"South Korea","away":"Czech Republic","date":"Jun 12","time":"03:00","sk":6120300},{"id":"A2","home":"Czech Republic","away":"South Africa","date":"Jun 18","time":"17:00","sk":6181700},{"id":"A3","home":"Mexico","away":"South Korea","date":"Jun 19","time":"02:00","sk":6190200},{"id":"A4","home":"South Africa","away":"South Korea","date":"Jun 25","time":"02:00","sk":6250200},{"id":"A5","home":"Czech Republic","away":"Mexico","date":"Jun 25","time":"02:00","sk":6250200}]},"B":{"teams":["Canada","Bosnia & Herzegovina","Qatar","Switzerland"],"matches":[{"id":"B0","home":"Canada","away":"Bosnia & Herzegovina","date":"Jun 12","time":"20:00","sk":6122000},{"id":"B1","home":"Qatar","away":"Switzerland","date":"Jun 13","time":"20:00","sk":6132000},{"id":"B2","home":"Switzerland","away":"Bosnia & Herzegovina","date":"Jun 18","time":"20:00","sk":6182000},{"id":"B3","home":"Canada","away":"Qatar","date":"Jun 18","time":"23:00","sk":6182300},{"id":"B4","home":"Switzerland","away":"Canada","date":"Jun 24","time":"20:00","sk":6242000},{"id":"B5","home":"Bosnia & Herzegovina","away":"Qatar","date":"Jun 24","time":"20:00","sk":6242000}]},"C":{"teams":["Brazil","Morocco","Haiti","Scotland"],"matches":[{"id":"C0","home":"Brazil","away":"Morocco","date":"Jun 13","time":"23:00","sk":6132300},{"id":"C1","home":"Haiti","away":"Scotland","date":"Jun 14","time":"02:00","sk":6140200},{"id":"C2","home":"Scotland","away":"Morocco","date":"Jun 19","time":"23:00","sk":6192300},{"id":"C3","home":"Brazil","away":"Haiti","date":"Jun 20","time":"01:30","sk":6200130},{"id":"C4","home":"Morocco","away":"Haiti","date":"Jun 24","time":"23:00","sk":6242300},{"id":"C5","home":"Scotland","away":"Brazil","date":"Jun 24","time":"23:00","sk":6242300}]},"D":{"teams":["USA","Paraguay","Australia","Turkey"],"matches":[{"id":"D0","home":"USA","away":"Paraguay","date":"Jun 13","time":"02:00","sk":6130200},{"id":"D1","home":"Australia","away":"Turkey","date":"Jun 14","time":"05:00","sk":6140500},{"id":"D2","home":"USA","away":"Australia","date":"Jun 19","time":"20:00","sk":6192000},{"id":"D3","home":"Turkey","away":"Paraguay","date":"Jun 20","time":"04:00","sk":6200400},{"id":"D4","home":"Turkey","away":"USA","date":"Jun 26","time":"03:00","sk":6260300},{"id":"D5","home":"Paraguay","away":"Australia","date":"Jun 26","time":"03:00","sk":6260300}]},"E":{"teams":["Germany","Curacao","Ivory Coast","Ecuador"],"matches":[{"id":"E0","home":"Germany","away":"Curacao","date":"Jun 14","time":"18:00","sk":6141800},{"id":"E1","home":"Ivory Coast","away":"Ecuador","date":"Jun 15","time":"00:00","sk":6150000},{"id":"E2","home":"Germany","away":"Ivory Coast","date":"Jun 20","time":"21:00","sk":6202100},{"id":"E3","home":"Ecuador","away":"Curacao","date":"Jun 21","time":"01:00","sk":6210100},{"id":"E4","home":"Curacao","away":"Ivory Coast","date":"Jun 25","time":"21:00","sk":6252100},{"id":"E5","home":"Ecuador","away":"Germany","date":"Jun 25","time":"21:00","sk":6252100}]},"F":{"teams":["Netherlands","Japan","Sweden","Tunisia"],"matches":[{"id":"F0","home":"Netherlands","away":"Japan","date":"Jun 14","time":"21:00","sk":6142100},{"id":"F1","home":"Sweden","away":"Tunisia","date":"Jun 15","time":"03:00","sk":6150300},{"id":"F2","home":"Netherlands","away":"Sweden","date":"Jun 20","time":"18:00","sk":6201800},{"id":"F3","home":"Tunisia","away":"Japan","date":"Jun 21","time":"05:00","sk":6210500},{"id":"F4","home":"Tunisia","away":"Netherlands","date":"Jun 26","time":"00:00","sk":6260000},{"id":"F5","home":"Japan","away":"Sweden","date":"Jun 26","time":"00:00","sk":6260000}]},"G":{"teams":["Belgium","Egypt","Iran","New Zealand"],"matches":[{"id":"G0","home":"Belgium","away":"Egypt","date":"Jun 15","time":"20:00","sk":6152000},{"id":"G1","home":"Iran","away":"New Zealand","date":"Jun 16","time":"02:00","sk":6160200},{"id":"G2","home":"Belgium","away":"Iran","date":"Jun 21","time":"20:00","sk":6212000},{"id":"G3","home":"New Zealand","away":"Egypt","date":"Jun 22","time":"02:00","sk":6220200},{"id":"G4","home":"New Zealand","away":"Belgium","date":"Jun 27","time":"04:00","sk":6270400},{"id":"G5","home":"Egypt","away":"Iran","date":"Jun 27","time":"04:00","sk":6270400}]},"H":{"teams":["Spain","Cape Verde","Saudi Arabia","Uruguay"],"matches":[{"id":"H0","home":"Spain","away":"Cape Verde","date":"Jun 15","time":"17:00","sk":6151700},{"id":"H1","home":"Saudi Arabia","away":"Uruguay","date":"Jun 15","time":"23:00","sk":6152300},{"id":"H2","home":"Spain","away":"Saudi Arabia","date":"Jun 21","time":"17:00","sk":6211700},{"id":"H3","home":"Uruguay","away":"Cape Verde","date":"Jun 21","time":"23:00","sk":6212300},{"id":"H4","home":"Cape Verde","away":"Saudi Arabia","date":"Jun 27","time":"01:00","sk":6270100},{"id":"H5","home":"Uruguay","away":"Spain","date":"Jun 27","time":"01:00","sk":6270100}]},"I":{"teams":["France","Senegal","Iraq","Norway"],"matches":[{"id":"I0","home":"France","away":"Senegal","date":"Jun 16","time":"20:00","sk":6162000},{"id":"I1","home":"Iraq","away":"Norway","date":"Jun 16","time":"23:00","sk":6162300},{"id":"I2","home":"France","away":"Iraq","date":"Jun 22","time":"22:00","sk":6222200},{"id":"I3","home":"Norway","away":"Senegal","date":"Jun 23","time":"01:00","sk":6230100},{"id":"I4","home":"Norway","away":"France","date":"Jun 26","time":"20:00","sk":6262000},{"id":"I5","home":"Senegal","away":"Iraq","date":"Jun 26","time":"20:00","sk":6262000}]},"J":{"teams":["Argentina","Algeria","Austria","Jordan"],"matches":[{"id":"J0","home":"Argentina","away":"Algeria","date":"Jun 17","time":"02:00","sk":6170200},{"id":"J1","home":"Austria","away":"Jordan","date":"Jun 17","time":"05:00","sk":6170500},{"id":"J2","home":"Argentina","away":"Austria","date":"Jun 22","time":"18:00","sk":6221800},{"id":"J3","home":"Jordan","away":"Algeria","date":"Jun 23","time":"04:00","sk":6230400},{"id":"J4","home":"Algeria","away":"Austria","date":"Jun 28","time":"03:00","sk":6280300},{"id":"J5","home":"Jordan","away":"Argentina","date":"Jun 28","time":"03:00","sk":6280300}]},"K":{"teams":["Portugal","DR Congo","Uzbekistan","Colombia"],"matches":[{"id":"K0","home":"Portugal","away":"DR Congo","date":"Jun 17","time":"18:00","sk":6171800},{"id":"K1","home":"Uzbekistan","away":"Colombia","date":"Jun 18","time":"03:00","sk":6180300},{"id":"K2","home":"Portugal","away":"Uzbekistan","date":"Jun 23","time":"18:00","sk":6231800},{"id":"K3","home":"Colombia","away":"DR Congo","date":"Jun 24","time":"03:00","sk":6240300},{"id":"K4","home":"Colombia","away":"Portugal","date":"Jun 28","time":"00:30","sk":6280030},{"id":"K5","home":"DR Congo","away":"Uzbekistan","date":"Jun 28","time":"00:30","sk":6280030}]},"L":{"teams":["England","Croatia","Ghana","Panama"],"matches":[{"id":"L0","home":"England","away":"Croatia","date":"Jun 17","time":"21:00","sk":6172100},{"id":"L1","home":"Ghana","away":"Panama","date":"Jun 18","time":"00:00","sk":6180000},{"id":"L2","home":"England","away":"Ghana","date":"Jun 23","time":"21:00","sk":6232100},{"id":"L3","home":"Panama","away":"Croatia","date":"Jun 24","time":"00:00","sk":6240000},{"id":"L4","home":"Panama","away":"England","date":"Jun 27","time":"22:00","sk":6272200},{"id":"L5","home":"Croatia","away":"Ghana","date":"Jun 27","time":"22:00","sk":6272200}]}}};

// 2026 format: 12 groups of 4. Top 2 from each group (24 teams) + 8 best 3rd-place teams qualify for R32.
// Play-offs: 12 x 3rd-place teams → 4 play-off matches → 4 more R32 qualifiers
// Actually: all 12 third-place teams are ranked; best 8 go straight to R32.
// The bottom 4 third-place play play-off games.
// For simplicity here: rank all 12 3rd-place teams, top 8 advance directly, 
// 9th-12th play two play-off matches (winners advance).
// R32: 32 teams total.

// Play-off match IDs
const PO_IDS = ['PO1','PO2'];

// Knockout round IDs: R32 (16 matches), R16 (8), QF (4), SF (2), Final (1)
// We'll derive teams from group results + playoffs
const KO_ROUNDS = [
  {id:'r32', label:'Round of 32', matches: Array.from({length:16},(_,i)=>({id:`R32_${i+1}`,home:null,away:null}))},
  {id:'r16', label:'Round of 16', matches: Array.from({length:8}, (_,i)=>({id:`R16_${i+1}`,home:null,away:null}))},
  {id:'qf',  label:'Quarter-finals', matches: Array.from({length:4}, (_,i)=>({id:`QF_${i+1}`,home:null,away:null}))},
  {id:'sf',  label:'Semi-finals', matches: Array.from({length:2}, (_,i)=>({id:`SF_${i+1}`,home:null,away:null}))},
  {id:'f',   label:'Final',       matches: [{id:'FINAL',home:null,away:null}]},
];

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'wc2026_v3';
let state = {scores:{}, koScores:{}, pens:{}, preds:{}};
let activeTab = 'fixtures';
let activeGroup = 'ALL';

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    state.scores  = state.scores  || {};
    state.koScores= state.koScores|| {};
    state.pens    = state.pens    || {};
    state.preds   = state.preds   || {};
  } catch(e) { state = {scores:{},koScores:{},pens:{},preds:{}}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ─── GROUP STATS ─────────────────────────────────────────────────────────────
function getGroupStats(gKey) {
  const {teams, matches} = RAW.groups[gKey];
  const s = {};
  teams.forEach(t => s[t]={name:t,pld:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,group:gKey});
  for (const m of matches) {
    const sc = state.scores[m.id];
    if (!sc || sc.hs===null||sc.as===null||sc.hs===undefined||sc.as===undefined) continue;
    const hs=+sc.hs, as=+sc.as;
    s[m.home].pld++; s[m.away].pld++;
    s[m.home].gf+=hs; s[m.home].ga+=as;
    s[m.away].gf+=as; s[m.away].ga+=hs;
    if(hs>as){s[m.home].w++;s[m.home].pts+=3;s[m.away].l++;}
    else if(hs<as){s[m.away].w++;s[m.away].pts+=3;s[m.home].l++;}
    else{s[m.home].d++;s[m.home].pts++;s[m.away].d++;s[m.away].pts++;}
  }
  return Object.values(s).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name-b.name)
    .map((t,i)=>({...t,gd:t.gf-t.ga,pos:i+1}));
}

function getAllGroupResults() {
  const winners={}, runners={}, thirds=[];
  for (const g of Object.keys(RAW.groups)) {
    const sorted = getGroupStats(g);
    winners[g] = sorted[0]?.name || null;
    runners[g] = sorted[1]?.name || null;
    if (sorted[2]) thirds.push({...sorted[2], group:g});
  }
  // Sort 3rd-place teams: pts → gd → gf
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  return {winners, runners, thirds};
}

function countPlayed() {
  let n=0;
  for(const g of Object.values(RAW.groups))
    for(const m of g.matches){const s=state.scores[m.id];if(s&&s.hs!=null&&s.as!=null)n++;}
  return n;
}

// ANNEX_C maps sorted-qualifying-groups-string -> [1A,1B,1D,1E,1G,1I,1K,1L assignments]
// Slots: 1A=A1's R32 match, 1B=B1's match, 1D=D1's, 1E=E1's, 1G=G1's, 1I=I1's, 1K=K1's, 1L=L1's

// R32 slots with 3rd place opponents, keyed by which group winner hosts them
// e.g. R32_7 = A1 vs 3rd -> uses Annex C slot "1A"
const SLOT_TO_R32 = {'1A':'R32_7','1B':'R32_13','1D':'R32_9','1E':'R32_2','1G':'R32_10','1I':'R32_5','1K':'R32_15','1L':'R32_8'};

function getAnnexCAssignment(thirds) {
  // Get the 8 qualifying 3rd place groups (top 8 by pts/gd/gf)
  const top8 = thirds.slice(0,8);
  const qualGroups = top8.map(t=>t.group).sort().join('');
  const assignment = ANNEX_C[qualGroups];
  if (!assignment) return null; // fallback: combination not in our table
  // Returns array [1A,1B,1D,1E,1G,1I,1K,1L] each value like "3E"
  // Map slot name -> team name
  const slots = ['1A','1B','1D','1E','1G','1I','1K','1L'];
  const result = {};
  slots.forEach((slot,i) => {
    const groupLetter = assignment[i][1]; // "3E" -> "E"
    const team = top8.find(t=>t.group===groupLetter);
    result[slot] = team ? team.name : null;
  });
  return result;
}

function getKoTeam(slot, results) {
  const {winners, runners, thirds} = results;
  if (!slot) return null;
  if (slot.match(/^[A-L]1$/)) return winners[slot[0]] || null;
  if (slot.match(/^[A-L]2$/)) return runners[slot[0]] || null;
  if (slot.startsWith('3rd_')) {
    // Annex C lookup
    const annexSlot = slot.replace('3rd_',''); // '3rd_1A' -> '1A'
    const assignment = getAnnexCAssignment(thirds);
    if (assignment && assignment[annexSlot]) return assignment[annexSlot];
    // Fallback: ranked order
    const idx = ['1A','1B','1D','1E','1G','1I','1K','1L'].indexOf(annexSlot);
    return thirds[idx]?.name || null;
  }
  return null;
}

function getKoWinner(matchId) {
  const sc = state.koScores[matchId];
  if (!sc||sc.hs==null||sc.as==null) return null;
  const hs=+sc.hs, as=+sc.as;
  if (hs!==as) return hs>as ? sc.homeTeam : sc.awayTeam;
  const p = state.pens[matchId];
  if (p&&p.h!=null&&p.a!=null&&+p.h!==+p.a) return +p.h>+p.a ? sc.homeTeam : sc.awayTeam;
  return null;
}

function buildR32(results) {
  return R32_BRACKET.map(m => {
    const home = getKoTeam(m.home, results);
    const away = getKoTeam(m.away, results);
    const sc = state.koScores[m.id] || {};
    state.koScores[m.id] = {...(state.koScores[m.id]||{}), homeTeam:home, awayTeam:away};
    return {...m, home, away, homeTeam:home, awayTeam:away,
            hs:sc.hs??null, as:sc.as??null,
            label:`${m.home} vs ${m.away}`};
  });
}

function buildPairedRound(pairs, roundId, r32Map) {
  return pairs.map(([idA, idB, date, time], i) => {
    const id = `${roundId}_${i+1}`;
    const home = getKoWinner(idA) || null;
    const away = getKoWinner(idB) || null;
    if (!state.koScores[id]) state.koScores[id]={};
    state.koScores[id].homeTeam = home;
    state.koScores[id].awayTeam = away;
    const sc = state.koScores[id];
    return {id, home, away, homeTeam:home, awayTeam:away,
            hs:sc.hs??null, as:sc.as??null, date, time, label:''};
  });
}

function predictionPoints(pred, actual) {
  // 3 = exact score, 1 = correct outcome (W/D/L), 0 = wrong, null = incomplete
  if (!pred || pred.hs==null || pred.as==null) return null;
  if (!actual || actual.hs==null || actual.as==null) return null;
  const ph=+pred.hs, pa=+pred.as, ah=+actual.hs, aa=+actual.as;
  if (ph===ah && pa===aa) return 3;
  const po = ph>pa?1:ph<pa?-1:0;
  const ao = ah>aa?1:ah<aa?-1:0;
  return po===ao ? 1 : 0;
}

  // Group matches: prediction vs actual group score
  for(const g of Object.values(RAW.groups))
    for(const m of g.matches){
      const pred=state.preds[m.id], act=state.scores[m.id];
      if(pred&&pred.hs!=null&&pred.as!=null) predicted++;
      const p=predictionPoints(pred, act);
      if(p!=null){played++; pts+=p; if(p===3)exact++; else if(p===1)outcome++;}
    }
  // Knockout matches: prediction vs actual koScore
  for(const id of Object.keys(state.preds)){
    if(id.startsWith('R32_')||id.startsWith('R16_')||id.startsWith('QF_')||id.startsWith('SF_')||id.startsWith('FINAL')){
      const pred=state.preds[id], act=state.koScores[id];
      if(pred&&pred.hs!=null&&pred.as!=null) predicted++;
      const p=predictionPoints(pred, act?{hs:act.hs,as:act.as}:null);
      if(p!=null){played++; pts+=p; if(p===3)exact++; else if(p===1)outcome++;}
    }
  }
  return {played, exact, outcome, pts, predicted};
}

function renderFixtures() {
  const groups=Object.keys(RAW.groups);

  // Predictor summary banner
  const ps=predictorStats();
  let html=`<div class="predictor-banner">
    <div class="pb-title">🔮 Your Predictions</div>
    <div class="pb-stats">
      <div class="pb-stat"><span class="pb-num">${ps.pts}</span><span class="pb-lbl">points</span></div>
      <div class="pb-stat"><span class="pb-num">${ps.exact}</span><span class="pb-lbl">exact</span></div>
      <div class="pb-stat"><span class="pb-num">${ps.outcome}</span><span class="pb-lbl">outcome</span></div>
      <div class="pb-stat"><span class="pb-num">${ps.predicted}</span><span class="pb-lbl">predicted</span></div>
    </div>
    <div class="pb-note">Exact score = 3 pts · Correct result = 1 pt</div>
  </div>`;

  html+=`<div class="group-filter"><div class="gpill ${activeGroup==='ALL'?'active':''}" onclick="filterGroup('ALL')">All</div>`;
  groups.forEach(g=>html+=`<div class="gpill ${activeGroup===g?'active':''}" onclick="filterGroup('${g}')">Group ${g}</div>`);
  html+='</div>';

  let all=[];
  const toShow=activeGroup==='ALL'?groups:[activeGroup];
  for(const g of toShow){
    for(const m of RAW.groups[g].matches){
      all.push({...m, group:g});
    }
  }
  all.sort((a,b)=>a.sk-b.sk);

  let lastDate=null;
  for(const m of all){
    if(m.date!==lastDate){
      html+=`<div class="date-header">${m.date}</div>`;
      lastDate=m.date;
    }
    const s=state.scores[m.id]||{hs:null,as:null};
    const hv=s.hs??'', av=s.as??'';
    const hc=s.hs!=null?'filled':'', ac=s.as!=null?'filled':'';
    let res='';
    if(s.hs!=null&&s.as!=null){
      if(+s.hs>+s.as) res=`<div class="match-result result-hw">${m.home} win</div>`;
      else if(+s.hs<+s.as) res=`<div class="match-result result-aw">${m.away} win</div>`;
      else res=`<div class="match-result result-draw">Draw</div>`;
    }

    // Predictor row
    const p=state.preds[m.id]||{hs:null,as:null};
    const phv=p.hs??'', pav=p.as??'';
    const phc=p.hs!=null?'pred-filled':'', pac=p.as!=null?'pred-filled':'';
    const pts=predictionPoints(p, s);
    let predBadge='';
    if(pts===3) predBadge=`<span class="pred-badge pred-3">✓ Exact +3</span>`;
    else if(pts===1) predBadge=`<span class="pred-badge pred-1">✓ Result +1</span>`;
    else if(pts===0) predBadge=`<span class="pred-badge pred-0">✗ +0</span>`;

    html+=`<div class="match-card">
      <div class="match-meta"><span class="grp-badge">${m.group}</span><span class="kickoff">${m.time}</span></div>
      <div class="match-row">
        <div class="team-name home">${m.home}</div>
        <input class="score-input ${hc}" type="number" min="0" value="${hv}" placeholder="–"
          oninput="setGroupScore('${m.id}','hs',this.value);updateInputStyle(this)"
          onfocus="this.select()" inputmode="numeric">
        <div class="vs">vs</div>
        <input class="score-input ${ac}" type="number" min="0" value="${av}" placeholder="–"
          oninput="setGroupScore('${m.id}','as',this.value);updateInputStyle(this)"
          onfocus="this.select()" inputmode="numeric">
        <div class="team-name away">${m.away}</div>
      </div>${res}
      <div class="pred-row">
        <span class="pred-label">Predict</span>
        <input class="pred-input ${phc}" type="number" min="0" value="${phv}" placeholder="–"
          oninput="setPred('${m.id}','hs',this.value)"
          onfocus="this.select()" inputmode="numeric">
        <span class="pred-dash">–</span>
        <input class="pred-input ${pac}" type="number" min="0" value="${pav}" placeholder="–"
          oninput="setPred('${m.id}','as',this.value)"
          onfocus="this.select()" inputmode="numeric">
        ${predBadge}
      </div>
    </div>`;
  }
  html+=`<div class="tz-note">All kick-off times shown in UK time (BST). Predictions are just for fun — they don't affect the standings.</div>`;
  return html;
}

// ─── TABLES ──────────────────────────────────────────────────────────────────
function renderTables() {
  let html=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span style="color:var(--muted);font-size:11px">Advance to R32</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div><span style="color:var(--muted);font-size:11px">Possible play-off</span></div>
  </div>`;
  for(const [g] of Object.entries(RAW.groups)){
    const sorted=getGroupStats(g);
    const played=sorted.reduce((s,t)=>s+t.pld,0)/2;
    html+=`<div class="group-section"><div class="group-title">Group ${g}<span>${played} played</span></div>
      <table class="standings-table"><thead><tr>
        <th class="pos">#</th><th class="team-col">Team</th>
        <th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th class="pts">Pts</th>
      </tr></thead><tbody>`;
    sorted.forEach((t,i)=>{
      const cls=i<2?'qualify':i===2?'playoff':'';
      const gdC=t.gd>0?'gd-pos':t.gd<0?'gd-neg':'';
      const gdS=t.pld>0?(t.gd>0?`+${t.gd}`:`${t.gd}`):'–';
      html+=`<tr class="${cls}"><td class="pos">${i+1}</td><td class="team-col">${t.name}</td>
        <td>${t.pld}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}</td><td>${t.ga}</td><td class="${gdC}">${gdS}</td><td class="pts">${t.pts}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  return html;
}

// ─── PLAY-OFFS ───────────────────────────────────────────────────────────────
function renderPlayoffs() {
  const {thirds} = getAllGroupResults();

  let html=`<div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.8;background:var(--card);padding:12px;border-radius:10px;border:1px solid var(--border)">
    <strong style="color:var(--text)">How it works:</strong> All 12 third-place teams are ranked by points, then goal difference, then goals scored. The <strong style="color:var(--green)">top 8 advance</strong> directly to the Round of 32. The <strong style="color:var(--accent)">bottom 4 are eliminated</strong> — there are no play-off matches.
  </div>`;

  const groupsDone = Object.keys(RAW.groups).filter(g=>
    RAW.groups[g].matches.every(m=>{ const s=state.scores[m.id]; return s&&s.hs!=null&&s.as!=null; })
  ).length;

  if(groupsDone < 12) {
    html += `<div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-style:italic">${groupsDone}/12 groups complete — table updates as results are entered</div>`;
  }

  html+=`<div class="group-section"><div class="group-title" style="color:var(--blue)">3rd-place team rankings</div>
    <table class="standings-table"><thead><tr>
      <th class="pos">#</th>
      <th class="team-col">Team</th>
      <th>Grp</th>
      <th>P</th>
      <th>W</th>
      <th>D</th>
      <th>L</th>
      <th>GF</th>
      <th>GA</th>
      <th>GD</th>
      <th class="pts">Pts</th>
      <th>Status</th>
    </tr></thead><tbody>`;

  thirds.forEach((t,i)=>{
    const advances = i < 8;
    const status = advances
      ? `<span style="color:var(--green);font-size:11px;font-weight:700">✓ R32</span>`
      : `<span style="color:var(--accent);font-size:11px;font-weight:700">✗ Out</span>`;
    const cls = advances ? 'qualify' : '';
    const gdS = t.pld>0 ? (t.gd>0?`+${t.gd}`:`${t.gd}`) : '–';
    const gdC = t.gd>0?'gd-pos':t.gd<0?'gd-neg':'';
    html+=`<tr class="${cls}">
      <td class="pos">${i+1}</td>
      <td class="team-col">${t.name||'TBD'}</td>
      <td style="color:var(--muted);font-size:11px">${t.group}</td>
      <td>${t.pld}</td>
      <td>${t.w}</td>
      <td>${t.d}</td>
      <td>${t.l}</td>
      <td>${t.gf}</td>
      <td>${t.ga}</td>
      <td class="${gdC}">${gdS}</td>
      <td class="pts">${t.pts}</td>
      <td>${status}</td>
    </tr>`;
  });

  // Pad with TBD rows for groups not yet complete
  for(let i=thirds.length; i<12; i++){
    const status = i<8
      ? `<span style="color:var(--green);font-size:11px">✓ R32</span>`
      : `<span style="color:var(--accent);font-size:11px">✗ Out</span>`;
    html+=`<tr>
      <td class="pos" style="color:var(--muted)">${i+1}</td>
      <td class="team-col" style="color:var(--muted);font-style:italic">TBD</td>
      <td>–</td><td>–</td><td>–</td><td>–</td><td>–</td><td>–</td><td>–</td><td>–</td>
      <td class="pts">–</td><td>${status}</td>
    </tr>`;
  }

  // Cutoff line explanation
  html+=`<tr><td colspan="12" style="text-align:center;font-size:10px;color:var(--muted);padding:6px;border-top:2px dashed var(--accent);font-style:italic">
    ── Top 8 advance · Bottom 4 eliminated ──
  </td></tr>`;

  html+=`</tbody></table></div>`;
  return html;
}

// ─── KNOCKOUT ────────────────────────────────────────────────────────────────
function renderKoMatch(m, type='ko', dateStr='') {
  const sc = state.koScores[m.id]||{};
  const hv=sc.hs??'', av=sc.as??'';
  const hc=sc.hs!=null?'filled':'', ac=sc.as!=null?'filled':'';
  const hasScore=sc.hs!=null&&sc.as!=null;
  const isDraw=hasScore&&+sc.hs===+sc.as;
  const p=state.pens[m.id]||{};
  const pHv=p.h??'',pAv=p.a??'';
  const pHc=p.h!=null?'filled':'',pAc=p.a!=null?'filled':'';

  const winner=getKoWinner(m.id);
  const homeStyle=winner&&winner===m.home?'color:var(--gold)':'';
  const awayStyle=winner&&winner===m.away?'color:var(--gold)':'';
  const tbd=!m.home&&!m.away;
  const disabled=tbd?'disabled':'';

  let pensHtml='';
  if(isDraw&&type!=='group'){
    pensHtml=`<div class="pens-row">
      <span style="color:var(--purple);font-size:10px">Pens:</span>
      <input class="pen-input ${pHc}" type="number" min="0" value="${pHv}" placeholder="–"
        oninput="setPens('${m.id}','h',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
      <span>–</span>
      <input class="pen-input ${pAc}" type="number" min="0" value="${pAv}" placeholder="–"
        oninput="setPens('${m.id}','a',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
    </div>`;
  }

  const winnerTag=winner?`<div class="winner-tag">✓ ${winner} advance</div>`:'';
  const badgeClass=type==='play-off'?'round-badge':'ko-badge';
  const badgeLabel=type==='play-off'?'Play-off':'KO';

  // Predictor row — only show when both teams are known
  let predHtml='';
  if(m.home && m.away){
    const pr=state.preds[m.id]||{hs:null,as:null};
    const prHv=pr.hs??'', prAv=pr.as??'';
    const prHc=pr.hs!=null?'pred-filled':'', prAc=pr.as!=null?'pred-filled':'';
    const pts=predictionPoints(pr, {hs:sc.hs,as:sc.as});
    let predBadge='';
    if(pts===3) predBadge=`<span class="pred-badge pred-3">✓ Exact +3</span>`;
    else if(pts===1) predBadge=`<span class="pred-badge pred-1">✓ Result +1</span>`;
    else if(pts===0) predBadge=`<span class="pred-badge pred-0">✗ +0</span>`;
    predHtml=`<div class="pred-row">
      <span class="pred-label">Predict</span>
      <input class="pred-input ${prHc}" type="number" min="0" value="${prHv}" placeholder="–"
        oninput="setPred('${m.id}','hs',this.value)" onfocus="this.select()" inputmode="numeric">
      <span class="pred-dash">–</span>
      <input class="pred-input ${prAc}" type="number" min="0" value="${prAv}" placeholder="–"
        oninput="setPred('${m.id}','as',this.value)" onfocus="this.select()" inputmode="numeric">
      ${predBadge}
    </div>`;
  }

  return `<div class="bracket-match">
    <div class="bm-label">${m.label||''}${dateStr}</div>
    <div class="bm-row">
      <div class="bm-team right ${!m.home?'tbd':''}" style="${homeStyle}">${m.home||'TBD'}</div>
      <input class="bm-score ${hc}" type="number" min="0" value="${hv}" placeholder="–"
        oninput="setKoScore('${m.id}','hs',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
      <div class="bm-vs">vs</div>
      <input class="bm-score ${ac}" type="number" min="0" value="${av}" placeholder="–"
        oninput="setKoScore('${m.id}','as',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
      <div class="bm-team ${!m.away?'tbd':''}" style="${awayStyle}">${m.away||'TBD'}</div>
    </div>
    ${pensHtml}${predHtml}${winnerTag}
  </div>`;
}

function renderKnockout() {
  const results = getAllGroupResults();
  const r32 = buildR32(results);
  const r16 = buildPairedRound(R16_PAIRS, 'R16');
  const qf  = buildPairedRound(QF_PAIRS,  'QF');
  const sf  = buildPairedRound(SF_PAIRS,  'SF');

  // Final
  const finId = 'FINAL_1';
  if(!state.koScores[finId]) state.koScores[finId]={};
  state.koScores[finId].homeTeam = getKoWinner('SF_1')||null;
  state.koScores[finId].awayTeam = getKoWinner('SF_2')||null;
  const fsc = state.koScores[finId];
  const fin = [{id:finId, home:fsc.homeTeam, away:fsc.awayTeam,
                homeTeam:fsc.homeTeam, awayTeam:fsc.awayTeam,
                hs:fsc.hs??null, as:fsc.as??null, date:'Jul 19', time:'20:00', label:''}];

  const roundConfigs = [
    {label:'Round of 32', matches:r32},
    {label:'Round of 16', matches:r16},
    {label:'Quarter-finals', matches:qf},
    {label:'Semi-finals', matches:sf},
    {label:'Final 🏆', matches:fin},
  ];

  let html='';
  for(const {label,matches} of roundConfigs){
    html+=`<div class="bracket-section"><div class="bracket-title">${label}</div>`;
    matches.forEach((m,i)=>{
      const dt = [m.date, m.time].filter(Boolean).join(' · ');
      const dateStr = dt ? `<span style="color:var(--muted);font-size:10px;font-weight:400;margin-left:6px">${dt}</span>` : '';
      m.label = m.label || `Match ${i+1}`;
      html+=renderKoMatch(m,'ko', dateStr);
    });
    html+='</div>';
  }

  const champion=getKoWinner('FINAL_1');
  if(champion){
    html+=`<div style="text-align:center;padding:24px;font-size:20px;font-weight:700;color:var(--gold)">
      🏆 ${champion}<br><span style="font-size:13px;color:var(--muted);font-weight:400;margin-top:4px;display:block">World Champions 2026</span>
    </div>`;
  }

  return html;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('main-content');
  if(activeTab==='fixtures') el.innerHTML=renderFixtures();
  else if(activeTab==='tables') el.innerHTML=renderTables();
  else if(activeTab==='playoffs') el.innerHTML=renderPlayoffs();
  else el.innerHTML=renderKnockout();
}

loadState();
document.getElementById('progress-text').textContent=`${countPlayed()} / 72 played`;
render();
</script>
