<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC 2026">
<meta name="theme-color" content="#1a1a2e">
<title>World Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--card:#1e2040;--border:#2a2d50;
  --accent:#e94560;--gold:#f5a623;--text:#f0f0f0;--muted:#8888aa;
  --green:#2ecc71;--blue:#3498db;--red:#e74c3c;--purple:#9b59b6;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
body{display:flex;flex-direction:column;overflow:hidden}

.header{background:var(--surface);padding:12px 16px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.header-top h1{font-size:17px;font-weight:700;letter-spacing:.3px}
.reload-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:8px;font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:transform .5s,color .2s,border-color .2s}
.reload-btn:active{color:var(--accent);border-color:var(--accent)}
.reload-btn.spin{transform:rotate(360deg)}
.trophy{font-size:22px;line-height:1}
.subtitle{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}

.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 10px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:color .2s,border-color .2s;letter-spacing:.3px;user-select:none}
.tab.active{color:var(--accent);border-color:var(--accent)}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}

.group-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.gpill{padding:5px 11px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none}
.gpill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.match-meta{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;gap:8px;align-items:center}
.match-meta .grp-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-meta .round-badge{background:var(--purple);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-meta .ko-badge{background:var(--gold);color:#1a1a2e;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-meta .kickoff{margin-left:auto;font-weight:700;color:var(--gold);font-size:12px}
.date-header{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px;margin:14px 2px 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.date-header:first-of-type{margin-top:0}
.tz-note{text-align:center;font-size:11px;color:var(--muted);font-style:italic;margin:16px 0 8px}

/* Predictor */
.predictor-banner{background:linear-gradient(135deg,#241b3a,#1a1a2e);border:1px solid var(--purple);border-radius:14px;padding:14px;margin-bottom:14px}
.pb-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px}
.pb-stats{display:flex;gap:5px}
.pb-stat{flex:1;text-align:center;background:rgba(155,89,182,.12);border-radius:9px;padding:7px 2px;min-width:0}
.pb-num{display:block;font-size:18px;font-weight:800;color:var(--purple)}
.pb-stat:first-child .pb-num{color:var(--gold)}
.pb-lbl{display:block;font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-note{font-size:10px;color:var(--muted);text-align:center;margin-top:9px;font-style:italic}
.pred-row{display:flex;align-items:center;gap:7px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.pred-label{font-size:11px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pred-input{width:34px;height:30px;background:#0f0f1a;border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield;transition:border-color .2s}
.pred-input:focus{border-color:var(--purple)}
.pred-input.pred-filled{border-color:var(--purple);color:var(--purple)}
.pred-input::-webkit-inner-spin-button,.pred-input::-webkit-outer-spin-button{-webkit-appearance:none}
.pred-dash{color:var(--muted);font-size:12px}
.pred-badge{margin-left:auto;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.pred-3{background:rgba(46,204,113,.18);color:var(--green)}
.pred-2{background:rgba(245,166,35,.18);color:var(--gold)}
.pred-1{background:rgba(52,152,219,.18);color:var(--blue)}
.pred-0{background:rgba(231,76,60,.15);color:var(--red)}
.match-row{display:grid;grid-template-columns:1fr auto auto auto 1fr;gap:6px;align-items:center}
.team-name{font-size:13px;font-weight:600}
.team-name.home{text-align:right}
.team-name.away{text-align:left}
.team-name.tbd{color:var(--muted);font-style:italic}
.score-input{width:44px;height:40px;background:#0f0f1a;border:2px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield;transition:border-color .2s}
.score-input:focus{border-color:var(--accent)}
.score-input.filled{border-color:var(--gold);color:var(--gold)}
.score-input:disabled{opacity:.3;cursor:not-allowed}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none}
.vs{font-size:11px;color:var(--muted);font-weight:500;padding:0 2px}
.match-result{font-size:11px;margin-top:5px;text-align:center}
.result-hw{color:var(--green)}
.result-draw{color:var(--blue)}
.result-aw{color:var(--gold)}

/* Penalties row */
.pens-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:11px;color:var(--muted)}
.pens-row span{font-weight:600}
.pen-input{width:36px;height:28px;background:#0f0f1a;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield}
.pen-input::-webkit-inner-spin-button,.pen-input::-webkit-outer-spin-button{-webkit-appearance:none}
.pen-input.filled{border-color:var(--purple);color:var(--purple)}

/* ET label */
.et-label{text-align:center;font-size:10px;color:var(--purple);margin-top:4px;font-weight:600}

.group-section{margin-bottom:18px}
.group-title{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--accent);padding:8px 12px;background:var(--card);border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;display:flex;align-items:center;gap:8px;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.reorder-cell{white-space:nowrap;padding:2px 4px!important}
.reorder-arrow{background:var(--card);border:1px solid var(--border);color:var(--text);width:22px;height:22px;border-radius:5px;font-size:9px;line-height:1;cursor:pointer;padding:0;margin:0 1px}
.reorder-arrow:disabled{opacity:.25;cursor:default}
.reorder-arrow:active:not(:disabled){background:var(--accent);border-color:var(--accent)}
.group-title span{color:var(--muted);font-size:11px;font-weight:400;margin-left:auto}
.standings-table{width:100%;table-layout:fixed;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:0 0 8px 8px;overflow:hidden}
.standings-table th{font-size:10px;font-weight:600;color:var(--muted);padding:6px 2px;text-align:center;background:#16182e;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.standings-table th.team-col{text-align:left;padding-left:10px}
.standings-table td{font-size:12px;padding:8px 2px;text-align:center;border-bottom:1px solid #1a1c36}
.standings-table td.team-col{text-align:left;padding-left:10px;font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr.qualify td{background:#1a2a1a}
.standings-table tr.playoff td{background:#1a1a2a}
.standings-table tr.qualify td.pos{color:var(--green);font-weight:700}
.standings-table tr.playoff td.pos{color:var(--blue);font-weight:700}
/* Fixed column widths so every group's table lines up identically */
.standings-table col.c-pos{width:24px}
.standings-table col.c-team{width:auto}
.standings-table col.c-stat{width:30px}
.standings-table col.c-pts{width:34px}
.pos{color:var(--muted);font-size:11px;font-weight:700}
.pts{font-weight:700;color:var(--gold)}
.gd-pos{color:var(--green)}
.gd-neg{color:var(--red)}

/* Bracket */
.bracket-section{margin-bottom:20px}
.bracket-title{font-size:12px;font-weight:700;letter-spacing:.8px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;padding:6px 10px;background:var(--card);border-radius:6px;border-left:3px solid var(--gold)}
.bracket-match{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:8px}
.bm-label{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bm-row{display:grid;grid-template-columns:1fr auto auto auto 1fr;gap:6px;align-items:center}
.bm-team{font-size:13px;font-weight:600}
.bm-team.right{text-align:right}
.bm-team.tbd{color:var(--muted);font-style:italic;font-size:11px}
.bm-score{width:36px;height:34px;background:#0f0f1a;border:2px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;appearance:textfield;transition:border-color .2s}
.bm-score:focus{border-color:var(--accent)}
.bm-score.filled{border-color:var(--gold);color:var(--gold)}
.bm-score:disabled{opacity:.25;cursor:not-allowed}
.bm-score::-webkit-inner-spin-button,.bm-score::-webkit-outer-spin-button{-webkit-appearance:none}
.bm-vs{font-size:10px;color:var(--muted)}
.winner-tag{font-size:10px;color:var(--green);margin-top:4px;text-align:center;font-weight:600}
.tbd-notice{text-align:center;font-size:12px;color:var(--muted);padding:20px;font-style:italic}

/* Knockout view toggle */
.ko-view-toggle{display:flex;gap:6px;margin-bottom:14px;background:var(--card);padding:4px;border-radius:10px;border:1px solid var(--border)}
.ko-vt-btn{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:600;color:var(--muted);border-radius:7px;cursor:pointer;transition:all .15s;user-select:none}
.ko-vt-btn.active{background:var(--accent);color:#fff}

/* Wall chart */
.wc-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;margin:0 -12px;padding-left:12px;padding-right:12px}
.wc-grid{display:flex;gap:10px;align-items:stretch;min-width:max-content}
.wc-col{display:flex;flex-direction:column;min-width:120px}
.wc-col-centre{min-width:150px}
.wc-col-head{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;text-align:center;margin-bottom:8px;flex-shrink:0}
.wc-body{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:8px}
.wc-col-centre .wc-body{justify-content:center;gap:14px}
.wc-match{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 6px;font-size:11px}
.wc-match-label{font-size:8px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wc-team{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:3px 4px;border-radius:4px;font-weight:600}
.wc-team+.wc-team{margin-top:2px}
.wc-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.wc-score{font-weight:800;color:var(--gold);min-width:14px;text-align:right}
.wc-tbd .wc-name{color:var(--muted);font-style:italic;font-weight:400}
.wc-win{background:rgba(46,204,113,.15)}
.wc-win .wc-name{color:var(--green)}
.wc-pens{font-size:8px;color:var(--purple);text-align:center;margin-top:2px}
.wc-final-box{background:linear-gradient(135deg,#2a2410,#1a1a2e);border:2px solid var(--gold);border-radius:12px;padding:10px 8px;text-align:center}
.wc-final-title{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1px}
.wc-final-sub{font-size:8px;color:var(--muted);margin-bottom:6px}
.wc-final-box .wc-team{justify-content:center}
.wc-champion{margin-top:8px;font-size:12px;font-weight:800;color:var(--gold);border-top:1px solid rgba(245,166,35,.3);padding-top:6px}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#222;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

// FIFA/Coca-Cola Men's World Ranking positions (lower = better), used as final tiebreaker
const FIFA_RANK={"Argentina":1,"France":2,"Spain":3,"England":4,"Portugal":5,"Brazil":6,"Morocco":7,"Netherlands":8,"Germany":9,"Belgium":10,"Croatia":11,"Mexico":13,"Colombia":14,"USA":15,"Senegal":16,"Japan":17,"Uruguay":18,"Switzerland":19,"South Korea":21,"Australia":22,"Iran":23,"Austria":24,"Turkey":26,"Algeria":27,"Ecuador":28,"Egypt":29,"Ivory Coast":30,"Norway":31,"Canada":32,"Panama":34,"Sweden":35,"Scotland":38,"Paraguay":42,"Czech Republic":43,"DR Congo":45,"Qatar":49,"Uzbekistan":50,"Tunisia":56,"Iraq":57,"Saudi Arabia":60,"South Africa":61,"Bosnia & Herzegovina":63,"Cape Verde":64,"Jordan":65,"Ghana":73,"New Zealand":82,"Curacao":83,"Haiti":85};
function fifaRank(name){ return FIFA_RANK[name] || 999; }

function getGroupStats(gKey) {
  const {teams, matches} = RAW.groups[gKey];
  const s = {};
  teams.forEach(t => s[t]={name:t,pld:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,group:gKey});
  const played = []; // played matches for head-to-head: {home,away,hs,as}
  for (const m of matches) {
    const sc = state.scores[m.id];
    if (!sc || sc.hs===null||sc.as===null||sc.hs===undefined||sc.as===undefined) continue;
    const hs=+sc.hs, as=+sc.as;
    s[m.home].pld++; s[m.away].pld++;
    s[m.home].gf+=hs; s[m.home].ga+=as;
    s[m.away].gf+=as; s[m.away].ga+=hs;
    if(hs>as){s[m.home].w++;s[m.home].pts+=3;s[m.away].l++;}
    else if(hs<as){s[m.away].w++;s[m.away].pts+=3;s[m.home].l++;}
    else{s[m.home].d++;s[m.home].pts++;s[m.away].d++;s[m.away].pts++;}
    played.push({home:m.home, away:m.away, hs, as});
  }
  // Add goal difference to each team
  Object.values(s).forEach(t=>t.gd=t.gf-t.ga);

  let sorted = sortGroupTeams(Object.values(s), played);

  // Apply manual override if the user has set one for this group
  const mo = state.manualOrder && state.manualOrder[gKey];
  if (mo && mo.length === sorted.length) {
    const byName = {};
    sorted.forEach(t => byName[t.name] = t);
    const reordered = mo.map(n => byName[n]).filter(Boolean);
    // Only use it if it covers every team (guards against team-name changes)
    if (reordered.length === sorted.length) sorted = reordered;
  }

  return sorted.map((t,i)=>({...t, pos:i+1, manual: !!mo}));
}

// FIFA 2026 group-stage tiebreakers, applied in order:
//   1. Points  2. Head-to-head points  3. Head-to-head GD  4. Head-to-head GF
//   5. Overall GD  6. Overall GF  7. Fair play* 8. FIFA ranking*  (*not available тАФ alphabetical fallback)
function sortGroupTeams(teamsArr, played) {
  // Head-to-head mini-table among a given subset of teams
  function h2h(subset){
    const names=new Set(subset.map(t=>t.name));
    const mini={};
    subset.forEach(t=>mini[t.name]={pts:0,gd:0,gf:0});
    for(const m of played){
      if(names.has(m.home)&&names.has(m.away)){
        const {hs,as}=m;
        mini[m.home].gf+=hs; mini[m.home].gd+=(hs-as);
        mini[m.away].gf+=as; mini[m.away].gd+=(as-hs);
        if(hs>as) mini[m.home].pts+=3;
        else if(hs<as) mini[m.away].pts+=3;
        else { mini[m.home].pts++; mini[m.away].pts++; }
      }
    }
    return mini;
  }

  // Break a tie among teams level on overall points
  function breakTie(tied){
    if(tied.length===1) return tied;
    const mini=h2h(tied);
    const ordered=[...tied].sort((a,b)=>
      mini[b.name].pts-mini[a.name].pts ||
      mini[b.name].gd -mini[a.name].gd  ||
      mini[b.name].gf -mini[a.name].gf
    );
    // Walk through, grouping teams that remain identical on head-to-head
    const out=[];
    let i=0;
    while(i<ordered.length){
      let j=i+1;
      while(j<ordered.length &&
        mini[ordered[j].name].pts===mini[ordered[i].name].pts &&
        mini[ordered[j].name].gd ===mini[ordered[i].name].gd  &&
        mini[ordered[j].name].gf ===mini[ordered[i].name].gf) j++;
      const sub=ordered.slice(i,j);
      if(sub.length===tied.length){
        // Head-to-head produced no separation тЖТ overall GD, GF, then alphabetical
        sub.sort((a,b)=> b.gd-a.gd || b.gf-a.gf || fifaRank(a.name)-fifaRank(b.name) || a.name.localeCompare(b.name));
        out.push(...sub);
      } else if(sub.length>1){
        // Some teams separated; re-apply head-to-head to the still-tied subset
        out.push(...breakTie(sub));
      } else {
        out.push(sub[0]);
      }
      i=j;
    }
    return out;
  }

  // Sort by points first, then resolve ties within each points band
  const byPts=[...teamsArr].sort((a,b)=>b.pts-a.pts);
  const final=[];
  let i=0;
  while(i<byPts.length){
    let j=i+1;
    while(j<byPts.length && byPts[j].pts===byPts[i].pts) j++;
    final.push(...breakTie(byPts.slice(i,j)));
    i=j;
  }
  return final;
}

function getAllGroupResults() {
  const winners={}, runners={}, thirds=[];
  for (const g of Object.keys(RAW.groups)) {
    const sorted = getGroupStats(g);
    winners[g] = sorted[0]?.name || null;
    runners[g] = sorted[1]?.name || null;
    if (sorted[2]) thirds.push({...sorted[2], group:g});
  }
  // 3rd-place ranking is across groups (they never meet) тЖТ overall pts, GD, GF, then alphabetical
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||fifaRank(a.name)-fifaRank(b.name)||a.name.localeCompare(b.name));
  return {winners, runners, thirds};
}

function countPlayed() {
  let n=0;
  for(const g of Object.values(RAW.groups))
    for(const m of g.matches){const s=state.scores[m.id];if(s&&s.hs!=null&&s.as!=null)n++;}
  return n;
}

// ANNEX_C maps sorted-qualifying-groups-string -> [1A,1B,1D,1E,1G,1I,1K,1L assignments]
// Slots: 1A=A1's R32 match, 1B=B1's match, 1D=D1's, 1E=E1's, 1G=G1's, 1I=I1's, 1K=K1's, 1L=L1's

// R32 slots with 3rd place opponents, keyed by which group winner hosts them
// e.g. R32_7 = A1 vs 3rd -> uses Annex C slot "1A"
const SLOT_TO_R32 = {'1A':'R32_7','1B':'R32_13','1D':'R32_9','1E':'R32_2','1G':'R32_10','1I':'R32_5','1K':'R32_15','1L':'R32_8'};

function getAnnexCAssignment(thirds) {
  // Get the 8 qualifying 3rd place groups (top 8 by pts/gd/gf)
  const top8 = thirds.slice(0,8);
  const qualGroups = top8.map(t=>t.group).sort().join('');
  const assignment = ANNEX_C[qualGroups];
  if (!assignment) return null; // fallback: combination not in our table
  // Returns array [1A,1B,1D,1E,1G,1I,1K,1L] each value like "3E"
  // Map slot name -> team name
  const slots = ['1A','1B','1D','1E','1G','1I','1K','1L'];
  const result = {};
  slots.forEach((slot,i) => {
    const groupLetter = assignment[i][1]; // "3E" -> "E"
    const team = top8.find(t=>t.group===groupLetter);
    result[slot] = team ? team.name : null;
  });
  return result;
}

function getKoTeam(slot, results) {
  const {winners, runners, thirds} = results;
  if (!slot) return null;
  if (slot.match(/^[A-L]1$/)) return winners[slot[0]] || null;
  if (slot.match(/^[A-L]2$/)) return runners[slot[0]] || null;
  if (slot.startsWith('3rd_')) {
    // Annex C lookup
    const annexSlot = slot.replace('3rd_',''); // '3rd_1A' -> '1A'
    const assignment = getAnnexCAssignment(thirds);
    if (assignment && assignment[annexSlot]) return assignment[annexSlot];
    // Fallback: ranked order
    const idx = ['1A','1B','1D','1E','1G','1I','1K','1L'].indexOf(annexSlot);
    return thirds[idx]?.name || null;
  }
  return null;
}

function getKoWinner(matchId) {
  const sc = state.koScores[matchId];
  if (!sc||sc.hs==null||sc.as==null) return null;
  const hs=+sc.hs, as=+sc.as;
  if (hs!==as) return hs>as ? sc.homeTeam : sc.awayTeam;
  const p = state.pens[matchId];
  if (p&&p.h!=null&&p.a!=null&&+p.h!==+p.a) return +p.h>+p.a ? sc.homeTeam : sc.awayTeam;
  return null;
}

function buildR32(results) {
  return R32_BRACKET.map(m => {
    const home = getKoTeam(m.home, results);
    const away = getKoTeam(m.away, results);
    const sc = state.koScores[m.id] || {};
    state.koScores[m.id] = {...(state.koScores[m.id]||{}), homeTeam:home, awayTeam:away};
    return {...m, home, away, homeTeam:home, awayTeam:away,
            hs:sc.hs??null, as:sc.as??null,
            label:`${m.home} vs ${m.away}`};
  });
}

function buildPairedRound(pairs, roundId, r32Map) {
  return pairs.map(([idA, idB, date, time], i) => {
    const id = `${roundId}_${i+1}`;
    const home = getKoWinner(idA) || null;
    const away = getKoWinner(idB) || null;
    if (!state.koScores[id]) state.koScores[id]={};
    state.koScores[id].homeTeam = home;
    state.koScores[id].awayTeam = away;
    const sc = state.koScores[id];
    return {id, home, away, homeTeam:home, awayTeam:away,
            hs:sc.hs??null, as:sc.as??null, date, time, label:''};
  });
}

// Update just the prediction badge for one match without re-rendering the whole list
// (a full render would steal focus from the score box being typed in)
function refreshPredBadge(id){
  const card=document.querySelector(`[data-match="${id}"]`);
  if(!card) return;
  const pr=state.preds[id], act=state.scores[id];
  const pts=predictionPoints(pr, act);
  let badge='';
  if(pts===3) badge='<span class="pred-badge pred-3">тЬУ Exact +3</span>';
  else if(pts===2) badge='<span class="pred-badge pred-2">тЬУ Aggregate +2</span>';
  else if(pts===1) badge='<span class="pred-badge pred-1">тЬУ Result +1</span>';
  else if(pts===0) badge='<span class="pred-badge pred-0">тЬЧ +0</span>';
  const slot=card.querySelector('.pred-badge-slot');
  if(slot) slot.innerHTML=badge;
  // Update the result line (Home win / Draw / Away win)
  const m=findMatch(id);
  const resSlot=card.querySelector('.result-slot');
  if(resSlot && m){
    let res='';
    if(act&&act.hs!=null&&act.as!=null){
      if(+act.hs>+act.as) res=`<div class="match-result result-hw">${m.home} win</div>`;
      else if(+act.hs<+act.as) res=`<div class="match-result result-aw">${m.away} win</div>`;
      else res=`<div class="match-result result-draw">Draw</div>`;
    }
    resSlot.innerHTML=res;
  }
  // Update the predictor summary banner totals
  updatePredBanner();
}

function findMatch(id){
  for(const g of Object.values(RAW.groups))

  return null;

function predictionPoints(pred, actual) {
  // 3 = exact score, 2 = correct goal difference (aggregate), 1 = correct outcome, 0 = wrong, null = incomplete
  if (!pred || pred.hs==null || pred.as==null) return null;
  if (!actual || actual.hs==null || actual.as==null) return null;
  const ph=+pred.hs, pa=+pred.as, ah=+actual.hs, aa=+actual.as;
  if (ph===ah && pa===aa) return 3;          // exact score
  if ((ph-pa) === (ah-aa)) return 2;         // same goal difference (implies correct outcome)
  const po = ph>pa?1:ph<pa?-1:0;
  const ao = ah>aa?1:ah<aa?-1:0;
  return po===ao ? 1 : 0;                     // correct outcome only
}

function predictorStats() {
  let played=0, exact=0, aggregate=0, outcome=0, pts=0, predicted=0;
  function tally(p){ played++; pts+=p; if(p===3)exact++; else if(p===2)aggregate++; else if(p===1)outcome++; }
  // Group matches: prediction vs actual group score
  for(const g of Object.values(RAW.groups))
    for(const m of g.matches){
      const pred=state.preds[m.id], act=state.scores[m.id];
      if(pred&&pred.hs!=null&&pred.as!=null) predicted++;
      const p=predictionPoints(pred, act);
      if(p!=null) tally(p);
    }
  // Knockout matches: prediction vs actual koScore
  for(const id of Object.keys(state.preds)){
    if(id.startsWith('R32_')||id.startsWith('R16_')||id.startsWith('QF_')||id.startsWith('SF_')||id.startsWith('FINAL')){
      const pred=state.preds[id], act=state.koScores[id];
      if(pred&&pred.hs!=null&&pred.as!=null) predicted++;
      const p=predictionPoints(pred, act?{hs:act.hs,as:act.as}:null);
      if(p!=null) tally(p);
    }
  }
  return {played, exact, aggregate, outcome, pts, predicted};
}

      <div class="pb-stat"><span class="pb-num pb-pts">${ps.pts}</span><span class="pb-lbl">points</span></div>
      <div class="pb-stat"><span class="pb-num pb-exact">${ps.exact}</span><span class="pb-lbl">exact</span></div>
      <div class="pb-stat"><span class="pb-num pb-aggregate">${ps.aggregate}</span><span class="pb-lbl">aggregate</span></div>
      <div class="pb-stat"><span class="pb-num pb-outcome">${ps.outcome}</span><span class="pb-lbl">outcome</span></div>
      <div class="pb-stat"><span class="pb-num pb-predicted">${ps.predicted}</span><span class="pb-lbl">predicted</span></div>
    </div>
    <div class="pb-note">Exact score = 3 ┬╖ Correct aggregate = 2 ┬╖ Correct result = 1</div>
  </div>`;

  html+=`<div class="group-filter"><div class="gpill ${activeGroup==='ALL'?'active':''}" onclick="filterGroup('ALL')">All</div>`;
  groups.forEach(g=>html+=`<div class="gpill ${activeGroup===g?'active':''}" onclick="filterGroup('${g}')">Group ${g}</div>`);
  html+='</div>';

  // When viewing a single group, show its standings table at the top
  if(activeGroup!=='ALL' && RAW.groups[activeGroup]){
    html+=`<div style="margin-bottom:16px">${renderGroupTable(activeGroup)}</div>`;
  }

  let all=[];
  const toShow=activeGroup==='ALL'?groups:[activeGroup];
  for(const g of toShow){
    for(const m of RAW.groups[g].matches){
      all.push({...m, group:g});
    }
  }
  all.sort((a,b)=>a.sk-b.sk);

  let lastDate=null;
  for(const m of all){
    if(m.date!==lastDate){
      html+=`<div class="date-header">${m.date}</div>`;
      lastDate=m.date;
    }
    const s=state.scores[m.id]||{hs:null,as:null};
    const hv=s.hs??'', av=s.as??'';
    const hc=s.hs!=null?'filled':'', ac=s.as!=null?'filled':'';
    let res='';
    if(s.hs!=null&&s.as!=null){
      if(+s.hs>+s.as) res=`<div class="match-result result-hw">${m.home} win</div>`;
      else if(+s.hs<+s.as) res=`<div class="match-result result-aw">${m.away} win</div>`;
      else res=`<div class="match-result result-draw">Draw</div>`;
    }

    // Predictor row
    const p=state.preds[m.id]||{hs:null,as:null};
    const phv=p.hs??'', pav=p.as??'';
    const phc=p.hs!=null?'pred-filled':'', pac=p.as!=null?'pred-filled':'';
    const pts=predictionPoints(p, s);
    let predBadge='';
    if(pts===3) predBadge=`<span class="pred-badge pred-3">тЬУ Exact +3</span>`;
    else if(pts===2) predBadge=`<span class="pred-badge pred-2">тЬУ Aggregate +2</span>`;
    else if(pts===1) predBadge=`<span class="pred-badge pred-1">тЬУ Result +1</span>`;
    else if(pts===0) predBadge=`<span class="pred-badge pred-0">тЬЧ +0</span>`;

    html+=`<div class="match-card" data-match="${m.id}">
      <div class="match-meta"><span class="grp-badge">${m.group}</span><span class="kickoff">${m.time}</span></div>
      <div class="match-row">
        <div class="team-name home">${m.home}</div>
        <input class="score-input ${hc}" type="number" min="0" value="${hv}" placeholder="тАУ"
          oninput="setGroupScore('${m.id}','hs',this.value);updateInputStyle(this)"
          onfocus="this.select()" inputmode="numeric">
        <div class="vs">vs</div>
        <input class="score-input ${ac}" type="number" min="0" value="${av}" placeholder="тАУ"
          oninput="setGroupScore('${m.id}','as',this.value);updateInputStyle(this)"
          onfocus="this.select()" inputmode="numeric">
        <div class="team-name away">${m.away}</div>
      </div><div class="result-slot">${res}</div>
      <div class="pred-row">
        <span class="pred-label">Predict</span>
        <input class="pred-input ${phc}" type="number" min="0" value="${phv}" placeholder="тАУ"
          oninput="setPred('${m.id}','hs',this.value)"
          onfocus="this.select()" inputmode="numeric">
        <span class="pred-dash">тАУ</span>
        <input class="pred-input ${pac}" type="number" min="0" value="${pav}" placeholder="тАУ"
          oninput="setPred('${m.id}','as',this.value)"
          onfocus="this.select()" inputmode="numeric">
        <span class="pred-badge-slot">${predBadge}</span>
      </div>
    </div>`;
  }
  html+=`<div class="tz-note">All kick-off times shown in UK time (BST). Predictions are just for fun тАФ they don't affect the standings.</div>`;
  return html;
}

// тФАтФАтФА TABLES тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
// Build a single group's standings table (also reused on the Fixtures tab)
function renderGroupTable(g) {
  const sorted=getGroupStats(g);
  const played=sorted.reduce((s,t)=>s+t.pld,0)/2;
  const editing = reorderGroup===g;
  const isManual = sorted.length && sorted[0].manual;
  const titleExtra = editing
    ? `<span style="margin-left:auto;display:flex;gap:8px;align-items:center">
         <span style="color:var(--gold);font-size:10px;font-weight:700">REORDER</span>
         <span onclick="resetGroupOrder('${g}')" style="color:var(--blue);font-size:10px;cursor:pointer">Auto</span>
         <span onclick="exitReorder()" style="color:var(--muted);font-size:10px;cursor:pointer">Done</span>
       </span>`
    : `<span>${played} played${isManual?' ┬╖ тЬО':''}</span>`;
  let html=`<div class="group-section"><div class="group-title" oncontextmenu="enterReorder(event,'${g}')" ontouchstart="startTitlePress(event,'${g}')" ontouchend="cancelTitlePress()" ontouchmove="cancelTitlePress()">Group ${g}${titleExtra}</div>
    <table class="standings-table">
    <colgroup><col class="c-pos"><col class="c-team"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="${editing?'c-stat':'c-pts'}">${editing?'<col style="width:54px">':''}</colgroup>
    <thead><tr>
      <th class="pos">#</th><th class="team-col">Team</th>
      <th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th class="pts">Pts</th>${editing?'<th></th>':''}
    </tr></thead><tbody>`;
  sorted.forEach((t,i)=>{
    const cls=i<2?'qualify':i===2?'playoff':'';
    const gdC=t.gd>0?'gd-pos':t.gd<0?'gd-neg':'';
    const gdS=t.pld>0?(t.gd>0?`+${t.gd}`:`${t.gd}`):'тАУ';
    const arrows = editing
      ? `<td class="reorder-cell">
           <button class="reorder-arrow" ${i===0?'disabled':''} onclick="moveTeam('${g}',${i},-1)">тЦ▓</button>
           <button class="reorder-arrow" ${i===sorted.length-1?'disabled':''} onclick="moveTeam('${g}',${i},1)">тЦ╝</button>
         </td>`
      : '';
    html+=`<tr class="${cls}"><td class="pos">${i+1}</td><td class="team-col">${t.name}</td>
      <td>${t.pld}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}</td><td>${t.ga}</td><td class="${gdC}">${gdS}</td><td class="pts">${t.pts}</td>${arrows}</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function renderTables() {
  let html=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span style="color:var(--muted);font-size:11px">Advance to R32</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div><span style="color:var(--muted);font-size:11px">Possible play-off</span></div>
  </div>`;
  for(const g of Object.keys(RAW.groups)) html+=renderGroupTable(g);
  return html;
}

// тФАтФАтФА MANUAL REORDER (discreet override) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
let _titlePressTimer=null;
function startTitlePress(e, g){
  cancelTitlePress();
  _titlePressTimer=setTimeout(()=>{ enterReorder(e, g); }, 600);
}
function cancelTitlePress(){ if(_titlePressTimer){ clearTimeout(_titlePressTimer); _titlePressTimer=null; } }
function enterReorder(e, g){
  if(e&&e.preventDefault) e.preventDefault();
  reorderGroup = g;
  // Seed manualOrder from current displayed order if not already set
  if(!state.manualOrder[g]){
    state.manualOrder[g] = getGroupStats(g).map(t=>t.name);
    saveState();
  }
  render();
  return false;
}
function exitReorder(){ reorderGroup=null; render(); }
function moveTeam(g, idx, dir){
  let order = (state.manualOrder[g] || getGroupStats(g).map(t=>t.name)).slice();
  const j = idx + dir;
  if(j<0||j>=order.length) return;
  [order[idx], order[j]] = [order[j], order[idx]];
  state.manualOrder[g] = order;
  saveState();
  render();
}
function resetGroupOrder(g){
  delete state.manualOrder[g];
  saveState();
  render();
}

  ).length;

  if(groupsDone < 12) {
    html += `<div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-style:italic">${groupsDone}/12 groups complete тАФ table updates as results are entered</div>`;
  }

  html+=`<div class="group-section"><div class="group-title" style="color:var(--blue)">3rd-place team rankings</div>
    <table class="standings-table">
    <colgroup><col class="c-pos"><col class="c-team"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-stat"><col class="c-pts"><col style="width:48px"></colgroup>
    <thead><tr>

      <th class="team-col">Team</th>
      <th>Grp</th>
      <th>P</th>
      <th>W</th>
      <th>D</th>
      <th>L</th>
      <th>GF</th>
      <th>GA</th>
      <th>GD</th>
      <th class="pts">Pts</th>
      <th>Status</th>
    </tr></thead><tbody>`;

  thirds.forEach((t,i)=>{
    const advances = i < 8;
    const status = advances
      ? `<span style="color:var(--green);font-size:11px;font-weight:700">тЬУ R32</span>`
      : `<span style="color:var(--accent);font-size:11px;font-weight:700">тЬЧ Out</span>`;
    const cls = advances ? 'qualify' : '';
    const gdS = t.pld>0 ? (t.gd>0?`+${t.gd}`:`${t.gd}`) : 'тАУ';
    const gdC = t.gd>0?'gd-pos':t.gd<0?'gd-neg':'';
    html+=`<tr class="${cls}">
      <td class="pos">${i+1}</td>
      <td class="team-col">${t.name||'TBD'}</td>
      <td style="color:var(--muted);font-size:11px">${t.group}</td>
      <td>${t.pld}</td>
      <td>${t.w}</td>
      <td>${t.d}</td>
      <td>${t.l}</td>
      <td>${t.gf}</td>
      <td>${t.ga}</td>
      <td class="${gdC}">${gdS}</td>
      <td class="pts">${t.pts}</td>
      <td>${status}</td>
    </tr>`;
  });

  // Pad with TBD rows for groups not yet complete
  for(let i=thirds.length; i<12; i++){
    const status = i<8
      ? `<span style="color:var(--green);font-size:11px">тЬУ R32</span>`
      : `<span style="color:var(--accent);font-size:11px">тЬЧ Out</span>`;
    html+=`<tr>
      <td class="pos" style="color:var(--muted)">${i+1}</td>

      <td class="pts">тАУ</td><td>${status}</td>

  }

  // Cutoff line explanation
  html+=`<tr><td colspan="12" style="text-align:center;font-size:10px;color:var(--muted);padding:6px;border-top:2px dashed var(--accent);font-style:italic">
    тФАтФА Top 8 advance ┬╖ Bottom 4 eliminated тФАтФА

  html+=`</tbody></table></div>`;
  return html;

// тФАтФАтФА KNOCKOUT тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function renderKoMatch(m, type='ko', dateStr='') {
  const sc = state.koScores[m.id]||{};
  const hv=sc.hs??'', av=sc.as??'';
  const hc=sc.hs!=null?'filled':'', ac=sc.as!=null?'filled':'';
  const hasScore=sc.hs!=null&&sc.as!=null;
  const isDraw=hasScore&&+sc.hs===+sc.as;
  const p=state.pens[m.id]||{};
  const pHv=p.h??'',pAv=p.a??'';
  const pHc=p.h!=null?'filled':'',pAc=p.a!=null?'filled':'';

  const winner=getKoWinner(m.id);
  const homeStyle=winner&&winner===m.home?'color:var(--gold)':'';
  const awayStyle=winner&&winner===m.away?'color:var(--gold)':'';
  const tbd=!m.home&&!m.away;
  const disabled=tbd?'disabled':'';

  let pensHtml='';
  if(isDraw&&type!=='group'){
    pensHtml=`<div class="pens-row">
      <span style="color:var(--purple);font-size:10px">Pens:</span>
      <input class="pen-input ${pHc}" type="number" min="0" value="${pHv}" placeholder="тАУ"
        data-field="pen-${m.id}-h"
        oninput="setPens('${m.id}','h',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
      <span>тАУ</span>
      <input class="pen-input ${pAc}" type="number" min="0" value="${pAv}" placeholder="тАУ"
        data-field="pen-${m.id}-a"
        oninput="setPens('${m.id}','a',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
    </div>`;
  }

  const winnerTag=winner?`<div class="winner-tag">тЬУ ${winner} advance</div>`:'';
  const badgeClass=type==='play-off'?'round-badge':'ko-badge';
  const badgeLabel=type==='play-off'?'Play-off':'KO';

  // Predictor row тАФ only show when both teams are known
  let predHtml='';
  if(m.home && m.away){
    const pr=state.preds[m.id]||{hs:null,as:null};
    const prHv=pr.hs??'', prAv=pr.as??'';
    const prHc=pr.hs!=null?'pred-filled':'', prAc=pr.as!=null?'pred-filled':'';
    const pts=predictionPoints(pr, {hs:sc.hs,as:sc.as});
    let predBadge='';
    if(pts===3) predBadge=`<span class="pred-badge pred-3">тЬУ Exact +3</span>`;
    else if(pts===2) predBadge=`<span class="pred-badge pred-2">тЬУ Aggregate +2</span>`;
    else if(pts===1) predBadge=`<span class="pred-badge pred-1">тЬУ Result +1</span>`;
    else if(pts===0) predBadge=`<span class="pred-badge pred-0">тЬЧ +0</span>`;
    predHtml=`<div class="pred-row">
      <span class="pred-label">Predict</span>
      <input class="pred-input ${prHc}" type="number" min="0" value="${prHv}" placeholder="тАУ"
        oninput="setPred('${m.id}','hs',this.value)" onfocus="this.select()" inputmode="numeric">
      <span class="pred-dash">тАУ</span>
      <input class="pred-input ${prAc}" type="number" min="0" value="${prAv}" placeholder="тАУ"
        oninput="setPred('${m.id}','as',this.value)" onfocus="this.select()" inputmode="numeric">
      <span class="pred-badge-slot">${predBadge}</span>
    </div>`;
  }

  return `<div class="bracket-match" data-ko="${m.id}">
    <div class="bm-label">${m.label||''}${dateStr}</div>
    <div class="bm-row">
      <div class="bm-team right ${!m.home?'tbd':''}" style="${homeStyle}">${m.home||'TBD'}</div>
      <input class="bm-score ${hc}" type="number" min="0" value="${hv}" placeholder="тАУ"
        data-field="ko-${m.id}-hs"
        oninput="setKoScore('${m.id}','hs',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
      <div class="bm-vs">vs</div>
      <input class="bm-score ${ac}" type="number" min="0" value="${av}" placeholder="тАУ"
        data-field="ko-${m.id}-as"
        oninput="setKoScore('${m.id}','as',this.value,'${m.home||''}','${m.away||''}');updateInputStyle(this)"
        onfocus="this.select()" inputmode="numeric" ${disabled}>
      <div class="bm-team ${!m.away?'tbd':''}" style="${awayStyle}">${m.away||'TBD'}</div>
    </div>
    ${pensHtml}${predHtml}${winnerTag}
  </div>`;
}

function renderKnockout() {
  const results = getAllGroupResults();
  const r32 = buildR32(results);
  const r16 = buildPairedRound(R16_PAIRS, 'R16');
  const qf  = buildPairedRound(QF_PAIRS,  'QF');
  const sf  = buildPairedRound(SF_PAIRS,  'SF');

  // Final
  const finId = 'FINAL_1';
  if(!state.koScores[finId]) state.koScores[finId]={};
  state.koScores[finId].homeTeam = getKoWinner('SF_1')||null;
  state.koScores[finId].awayTeam = getKoWinner('SF_2')||null;
  const fsc = state.koScores[finId];
  const fin = [{id:finId, home:fsc.homeTeam, away:fsc.awayTeam,
                homeTeam:fsc.homeTeam, awayTeam:fsc.awayTeam,
                hs:fsc.hs??null, as:fsc.as??null, date:'Jul 19', time:'20:00', label:''}];

  const rounds = {r32, r16, qf, sf, fin};

  // View toggle
  let html=`<div class="ko-view-toggle">
    <div class="ko-vt-btn ${koView==='list'?'active':''}" onclick="setKoView('list')">ЁЯУЛ List</div>
    <div class="ko-vt-btn ${koView==='chart'?'active':''}" onclick="setKoView('chart')">ЁЯПЖ Wall Chart</div>
  </div>`;

  if(koView==='chart') return html + renderKoWallchart(rounds);

  // тФАтФА List view тФАтФА
  const roundConfigs = [
    {label:'Round of 32', matches:r32},
    {label:'Round of 16', matches:r16},
    {label:'Quarter-finals', matches:qf},
    {label:'Semi-finals', matches:sf},
    {label:'Final ЁЯПЖ', matches:fin},
  ];

  for(const {label,matches} of roundConfigs){
    html+=`<div class="bracket-section"><div class="bracket-title">${label}</div>`;
    matches.forEach((m,i)=>{
      const dt = [m.date, m.time].filter(Boolean).join(' ┬╖ ');
      const dateStr = dt ? `<span style="color:var(--muted);font-size:10px;font-weight:400;margin-left:6px">${dt}</span>` : '';
      m.label = m.label || `Match ${i+1}`;
      html+=renderKoMatch(m,'ko', dateStr);
    });
    html+='</div>';
  }

  const champion=getKoWinner('FINAL_1');
  if(champion){
    html+=`<div style="text-align:center;padding:24px;font-size:20px;font-weight:700;color:var(--gold)">
      ЁЯПЖ ${champion}<br><span style="font-size:13px;color:var(--muted);font-weight:400;margin-top:4px;display:block">World Champions 2026</span>
    </div>`;
  }

  return html;
}

// тФАтФАтФА WALL CHART тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function koTeamLine(team, score, isWinner){
  const cls = isWinner ? 'wc-team wc-win' : (team ? 'wc-team' : 'wc-team wc-tbd');
  const sc = score!=null ? score : '';
  return `<div class="${cls}"><span class="wc-name">${team||'TBD'}</span><span class="wc-score">${sc}</span></div>`;
}

function wcMatch(m){
  const w=getKoWinner(m.id);
  const homeWin = w && w===m.home;
  const awayWin = w && w===m.away;
  const dt=[m.date,m.time].filter(Boolean).join(' ┬╖ ');
  const pens=state.pens[m.id];
  let pensStr='';
  if(pens&&pens.h!=null&&pens.a!=null) pensStr=`<div class="wc-pens">pens ${pens.h}тАУ${pens.a}</div>`;
  return `<div class="wc-match" data-ko="${m.id}">
    <div class="wc-match-label">${m.label||''}${dt?` ┬╖ ${dt}`:''}</div>
    ${koTeamLine(m.home, m.hs, homeWin)}
    ${koTeamLine(m.away, m.as, awayWin)}
    ${pensStr}
  </div>`;
}

function renderKoWallchart(R){
  // Label the matches like the list view does
  R.r32.forEach((m,i)=>m.label=m.label||`Match ${i+1}`);
  R.r16.forEach((m,i)=>m.label=m.label||`R16 ${i+1}`);
  R.qf.forEach((m,i)=>m.label=m.label||`QF ${i+1}`);
  R.sf.forEach((m,i)=>m.label=m.label||`SF ${i+1}`);
  R.fin.forEach(m=>m.label='Final');

  // Left half indices: R32 matches 0-7 feed R16 0-3 feed QF 0-1 feed SF 0
  // Right half: R32 8-15 feed R16 4-7 feed QF 2-3 feed SF 1
  // (Our R16_PAIRS order already groups them; map by position)
  const champion=getKoWinner('FINAL_1');

  let html=`<div class="wc-scroll"><div class="wc-grid">`;

  // Column: Round of 32 (left) тАФ matches 0-7
  html+=`<div class="wc-col"><div class="wc-col-head">Round of 32</div><div class="wc-body">`;
  for(let i=0;i<8;i++) html+=wcMatch(R.r32[i]);
  html+=`</div></div>`;

  // Round of 16 (left) тАФ 0-3
  html+=`<div class="wc-col"><div class="wc-col-head">Round of 16</div><div class="wc-body">`;
  for(let i=0;i<4;i++) html+=wcMatch(R.r16[i]);
  html+=`</div></div>`;

  // Quarter-finals (left) тАФ 0-1
  html+=`<div class="wc-col"><div class="wc-col-head">Quarter-finals</div><div class="wc-body">`;
  for(let i=0;i<2;i++) html+=wcMatch(R.qf[i]);
  html+=`</div></div>`;

  // Centre column: SF, Final, champion, SF
  html+=`<div class="wc-col wc-col-centre">
    <div class="wc-col-head">Semis &amp; Final</div>
    <div class="wc-body">
      ${wcMatch(R.sf[0])}
      <div class="wc-final-box">
        <div class="wc-final-title">ЁЯПЖ FINAL</div>
        <div class="wc-final-sub">${R.fin[0].date} ┬╖ ${R.fin[0].time}</div>
        ${koTeamLine(R.fin[0].home, R.fin[0].hs, champion&&champion===R.fin[0].home)}
        ${koTeamLine(R.fin[0].away, R.fin[0].as, champion&&champion===R.fin[0].away)}
        ${champion?`<div class="wc-champion">ЁЯПЖ ${champion}</div>`:''}
      </div>
      ${wcMatch(R.sf[1])}
    </div>
  </div>`;

  // Quarter-finals (right) тАФ 2-3
  html+=`<div class="wc-col"><div class="wc-col-head">Quarter-finals</div><div class="wc-body">`;
  for(let i=2;i<4;i++) html+=wcMatch(R.qf[i]);
  html+=`</div></div>`;

  // Round of 16 (right) тАФ 4-7
  html+=`<div class="wc-col"><div class="wc-col-head">Round of 16</div><div class="wc-body">`;
  for(let i=4;i<8;i++) html+=wcMatch(R.r16[i]);
  html+=`</div></div>`;

  // Round of 32 (right) тАФ 8-15
  html+=`<div class="wc-col"><div class="wc-col-head">Round of 32</div><div class="wc-body">`;
  for(let i=8;i<16;i++) html+=wcMatch(R.r32[i]);
  html+=`</div></div>`;

  html+=`</div></div>`;
  html+=`<div class="tz-note">Pinch or scroll horizontally to see the full bracket. Enter scores in the List view.</div>`;
  return html;
}

// тФАтФАтФА MAIN RENDER тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function render(){
  const el=document.getElementById('main-content');
  // Preserve scroll position and the focused input across the re-render
  const scrollY = el ? el.scrollTop : 0;
  const active = document.activeElement;
  let focusKey = null;
  if(active && active.dataset && active.dataset.field){
    focusKey = active.dataset.field;
  }

  if(activeTab==='fixtures') el.innerHTML=renderFixtures();
  else if(activeTab==='tables') el.innerHTML=renderTables();
  else if(activeTab==='playoffs') el.innerHTML=renderPlayoffs();
  else el.innerHTML=renderKnockout();

  // Restore scroll
  if(el) el.scrollTop = scrollY;
  // Restore focus to the same input
  if(focusKey){
    const restore = el.querySelector(`[data-field="${focusKey}"]`);
    if(restore){ restore.focus(); if(restore.select) restore.select(); }
  }
}

// тФАтФАтФА RELOAD тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function showToast(msg){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

function reloadApp(btn){
  if(btn){ btn.classList.add('spin'); setTimeout(()=>btn.classList.remove('spin'),500); }
  // Reload latest saved state from storage and re-render everything
  loadState();
  document.getElementById('progress-text').textContent=`${countPlayed()} / 72 played`;
  render();
  showToast('Refreshed');
}

// Pull-to-refresh on the scroll area (works in standalone home-screen apps where
// the browser's native pull-to-refresh is disabled)
(function(){
  const el=document.getElementById('main-content');
  if(!el) return;
  let startY=0, pulling=false;
  el.addEventListener('touchstart',e=>{
    if(el.scrollTop<=0){ startY=e.touches[0].clientY; pulling=true; }
    else pulling=false;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!pulling) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>70){ pulling=false; reloadApp(document.querySelector('.reload-btn')); }
  },{passive:true});
})();

loadState();
document.getElementById('progress-text').textContent=`${countPlayed()} / 72 played`;
render();
</script>
